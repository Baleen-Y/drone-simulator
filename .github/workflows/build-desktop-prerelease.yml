name: Build Desktop Prerelease

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag. Defaults to v<package-version>-pre.<run-number>.
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Clone source repository
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.GIT_ADDRESS }}" || (echo "Missing secrets.GIT_ADDRESS" && exit 1)
          GIT_REF="${{ secrets.GIT_REF }}"
          if [ -z "$GIT_REF" ]; then
            GIT_REF="main"
          fi
          git clone --depth 1 --branch "$GIT_REF" "${{ secrets.GIT_ADDRESS }}" source
          echo "Cloned source repository metadata:"
          git -C source status --short --branch
          git -C source log -1 --oneline || true
          echo "Top-level source files:"
          find source -maxdepth 2 -mindepth 1 -not -path '*/.git/*' -print | sort | head -200

      - name: Read build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_JSON="source/package.json"
          if [ ! -f "$PACKAGE_JSON" ]; then
            mapfile -t packages < <(find source -maxdepth 4 -name package.json -not -path '*/node_modules/*' -print)
            printf 'Found package.json files:\n%s\n' "${packages[@]:-none}"
            if [ "${#packages[@]}" -eq 1 ]; then
              PACKAGE_JSON="${packages[0]}"
              echo "Using nested package metadata: $PACKAGE_JSON"
            else
              echo "Expected source/package.json, or exactly one nested package.json under source."
              exit 1
            fi
          fi

          VERSION="$(node -p "require('./${PACKAGE_JSON}').version")"
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION}-pre.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          echo "Tag: $TAG"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Clone source repository
        shell: pwsh
        run: |
          if ("${{ secrets.GIT_ADDRESS }}" -eq "") { throw "Missing secrets.GIT_ADDRESS" }
          $gitRef = "${{ secrets.GIT_REF }}"
          if ($gitRef -eq "") { $gitRef = "main" }
          git clone --depth 1 --branch $gitRef "${{ secrets.GIT_ADDRESS }}" source

      - name: Resolve source directory
        id: src
        shell: pwsh
        run: |
          $dir = "source"
          if (-not (Test-Path "source/package.json")) {
            $packages = @(Get-ChildItem -Path source -Filter package.json -Recurse | Where-Object {
              $_.FullName -notmatch '[\\/]node_modules[\\/]'
            })
            Write-Host "Found package.json files:"
            if ($packages.Count -eq 0) { Write-Host "none" } else { $packages.FullName | Write-Host }
            if ($packages.Count -ne 1) {
              throw "Expected source/package.json, or exactly one nested package.json under source."
            }
            $dir = (Resolve-Path -Relative $packages[0].DirectoryName) -replace '^[.][\\/]', '' -replace '\\', '/'
            Write-Host "Using nested source directory: $dir"
          }
          "dir=$dir" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.src.outputs.dir }}
        shell: pwsh
        run: npm install --package-lock=false

      - name: Build Windows installer
        working-directory: ${{ steps.src.outputs.dir }}
        shell: pwsh
        run: npm run dist:win -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: drone-simulator-windows-${{ needs.prepare.outputs.version }}
          path: |
            ${{ steps.src.outputs.dir }}/release/*.exe
            ${{ steps.src.outputs.dir }}/release/*.msi
            ${{ steps.src.outputs.dir }}/release/*.blockmap
          if-no-files-found: error

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Clone source repository
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.GIT_ADDRESS }}" || (echo "Missing secrets.GIT_ADDRESS" && exit 1)
          GIT_REF="${{ secrets.GIT_REF }}"
          if [ -z "$GIT_REF" ]; then
            GIT_REF="main"
          fi
          git clone --depth 1 --branch "$GIT_REF" "${{ secrets.GIT_ADDRESS }}" source

      - name: Resolve source directory
        id: src
        shell: bash
        run: |
          set -euo pipefail
          dir="source"
          if [ ! -f source/package.json ]; then
            mapfile -t packages < <(find source -maxdepth 4 -name package.json -not -path '*/node_modules/*' -print)
            printf 'Found package.json files:\n%s\n' "${packages[@]:-none}"
            if [ "${#packages[@]}" -ne 1 ]; then
              echo "Expected source/package.json, or exactly one nested package.json under source."
              exit 1
            fi
            dir="$(dirname "${packages[0]}")"
            echo "Using nested source directory: $dir"
          fi
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.src.outputs.dir }}
        run: npm install --package-lock=false

      - name: Import Apple signing material from project
        working-directory: ${{ steps.src.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail

          load_env() {
            local file="$1"
            if [ -f "$file" ]; then
              set -a
              # shellcheck disable=SC1090
              . "$file"
              set +a
            fi
          }

          load_env doc/mac/electron-builder-dmg.env
          DMG_CSC_LINK="${CSC_LINK:-./doc/mac/dev.p12}"
          DMG_CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD:-}"
          DMG_CSC_INSTALLER_LINK="${CSC_INSTALLER_LINK:-}"
          DMG_CSC_INSTALLER_KEY_PASSWORD="${CSC_INSTALLER_KEY_PASSWORD:-}"

          load_env doc/mac/electron-builder-mas.env
          MAS_CSC_LINK="${CSC_LINK:-./doc/mac/distribution.p12}"
          MAS_CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD:-}"
          MAS_CSC_INSTALLER_LINK="${CSC_INSTALLER_LINK:-./doc/mac/installer.p12}"
          MAS_CSC_INSTALLER_KEY_PASSWORD="${CSC_INSTALLER_KEY_PASSWORD:-}"
          MAS_PROVISIONING_PROFILE="${MAS_PROVISIONING_PROFILE:-./doc/mac/distribution.provisionprofile}"

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-drone-simulator-ci-keychain}"
          KEYCHAIN_PATH="$RUNNER_TEMP/build-signing.keychain-db"

          require_file() {
            if [ ! -f "$1" ]; then
              echo "Missing required signing file: $1"
              exit 1
            fi
          }

          require_file "$DMG_CSC_LINK"
          require_file "$MAS_CSC_LINK"
          require_file "$MAS_CSC_INSTALLER_LINK"
          require_file "$MAS_PROVISIONING_PROFILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$DMG_CSC_LINK" -P "$DMG_CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          if [ -n "$DMG_CSC_INSTALLER_LINK" ] && [ -f "$DMG_CSC_INSTALLER_LINK" ]; then
            security import "$DMG_CSC_INSTALLER_LINK" -P "$DMG_CSC_INSTALLER_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          fi

          security import "$MAS_CSC_LINK" -P "$MAS_CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$MAS_CSC_INSTALLER_LINK" -P "$MAS_CSC_INSTALLER_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$MAS_PROVISIONING_PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/distribution.provisionprofile"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        working-directory: ${{ steps.src.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f doc/mac/electron-builder-dmg.env ]; then
            set -a
            . doc/mac/electron-builder-dmg.env
            set +a
          fi
          npm run dist:mac:dmg -- --publish never

      - name: Build Mac App Store package
        working-directory: ${{ steps.src.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f doc/mac/electron-builder-mas.env ]; then
            set -a
            . doc/mac/electron-builder-mas.env
            set +a
          fi
          npm run dist:mac:mas -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: drone-simulator-macos-${{ needs.prepare.outputs.version }}
          path: |
            ${{ steps.src.outputs.dir }}/release/*.dmg
            ${{ steps.src.outputs.dir }}/release/*.pkg
            ${{ steps.src.outputs.dir }}/release/**/*.pkg
          if-no-files-found: error

  prerelease:
    needs:
      - prepare
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          mapfile -t files < <(find artifacts -maxdepth 3 -type f -print)
          printf '%s\n' "${files[@]}"
          [ "${#files[@]}" -gt 0 ] || (echo "No release assets found" && exit 1)
          gh release delete "$RELEASE_TAG" --cleanup-tag --yes || true
          gh release create "$RELEASE_TAG" "${files[@]}" \
            --prerelease \
            --title "Drone Simulator ${VERSION} prerelease" \
            --notes "Automated prerelease build for Drone Simulator ${VERSION}. Includes Windows installer, macOS DMG, and Mac App Store package."
